name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages for GitHub Actions deployment
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sL \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for any branch-based deployment to finish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for competing Jekyll deployments to complete..."
          # The Jekyll "pages build and deployment" workflow starts at the same time as ours.
          # Its build+deploy typically takes 30-35s. Sleep first so we deploy after it finishes.
          sleep 30
          # Then poll until no "pages build and deployment" runs are still active.
          # Up to 12 attempts × 10s = 2 more minutes, for a total max wait of ~2.5 minutes.
          for i in $(seq 1 12); do
            ACTIVE=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}" \
              | jq '[.workflow_runs[] | select(.name == "pages build and deployment" and .status != "completed")] | length')
            if [ "$ACTIVE" = "0" ] || [ -z "$ACTIVE" ]; then
              echo "No competing deployment still active"
              break
            fi
            echo "Competing deployment still active, waiting... (attempt $i)"
            sleep 10
          done
      - id: deployment
        uses: actions/deploy-pages@v4
